<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}STAR Assurances{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --dark: #0A0A0F;
  --dark2: #12121A;
  --dark3: #1A1A26;
  --border: rgba(201,168,76,0.2);
  --text: #F0EDE6;
  --text-muted: rgba(240,237,230,0.55);
  --green: #2ECC71;
  --red: #E74C3C;
  --orange: #F39C12;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--dark2);
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 700; font-size: 18px;
  letter-spacing: 0.05em;
}
.logo span { color: var(--gold); }
.card {
  background: var(--dark2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 100px;
  font-size: 12px; font-weight: 500; letter-spacing: 0.03em;
}
.badge-valid { background: rgba(46,204,113,0.15); color: var(--green); border: 1px solid rgba(46,204,113,0.3); }
.badge-expired { background: rgba(231,76,60,0.15); color: var(--red); border: 1px solid rgba(231,76,60,0.3); }
.badge-pending { background: rgba(243,156,18,0.15); color: var(--orange); border: 1px solid rgba(243,156,18,0.3); }
.btn {
  display: block; width: 100%;
  padding: 14px 20px; border-radius: 12px;
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
  letter-spacing: 0.04em; cursor: pointer;
  text-align: center; text-decoration: none;
  transition: all 0.2s; border: none;
}
.btn-gold {
  background: var(--gold);
  color: var(--dark);
}
.btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-outline {
  background: transparent;
  color: var(--text); border: 1px solid var(--border);
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.btn-danger {
  background: rgba(231,76,60,0.15);
  color: var(--red); border: 1px solid rgba(231,76,60,0.3);
}
.btn-danger:hover { background: rgba(231,76,60,0.25); }
.label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.value { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 14px; }
.row { display: flex; gap: 1rem; flex-wrap: wrap; }
.col { flex: 1; min-width: 120px; }
.sep { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
.progress-wrap { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; margin: 8px 0; }
.progress-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
.progress-bar.expired { background: var(--red); }
input, select {
  width: 100%;
  background: var(--dark3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--gold); }
input::placeholder { color: var(--text-muted); }
.container { max-width: 480px; margin: 0 auto; padding: 1.5rem; }
.avatar {
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px;
  color: var(--dark); flex-shrink: 0;
}
.alert-success {
  background: rgba(46,204,113,0.12);
  border: 1px solid rgba(46,204,113,0.3);
  border-radius: 12px; padding: 1rem;
  color: var(--green); text-align: center;
  display: none; margin-top: 1rem;
}
</style>
{% block extra_style %}{% endblock %}
</head>
<body>
<div class="topbar">
  <div class="logo">STAR <span>Assurances</span></div>
  {% block topbar_right %}{% endblock %}
</div>
{% block content %}{% endblock %}
<script>{% block script %}{% endblock %}</script>
</body>
</html>
